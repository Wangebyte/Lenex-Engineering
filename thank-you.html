<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message Sent – Lenex Engineering</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #0a1628;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .box {
      max-width: 480px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 24px;
    }
    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.4rem;
      letter-spacing: .06em;
      margin-bottom: 16px;
      color: #22a862;
    }
    p {
      font-size: 1rem;
      color: rgba(255,255,255,.7);
      line-height: 1.8;
      margin-bottom: 32px;
    }
    a {
      display: inline-block;
      background: #1a7a4a;
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      transition: background .3s;
    }
    a:hover { background: #22a862; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">✅</div>
    <h1>Message Sent!</h1>
    <p>Thank you for reaching out to Lenex Engineering Consultants. We have received your enquiry and will get back to you within 24 hours.</p>
    <a href="index.html">← Back to Website</a>
  </div>
</body>
</html>
